name: Build Android APK

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - 'README.md'
      - 'metadata.json'
      - '.gitignore'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from the Actions tab on GitHub

jobs:
  build:
    name: Compile and Package APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Set up Java Development Kit (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup and Cache Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Configure Secure Env Properties
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
            echo "Copied .env.example to .env successfully."
          else
            echo "Creating fallback empty .env file."
            touch .env
          fi

      - name: Make Gradlew Executable
        run: chmod +x gradlew

      - name: Build Debug Application (APK)
        run: ./gradlew assembleDebug

      - name: Verify and Locate Generated APK
        id: get_apk_path
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug/ -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ Error: Could not find generated APK output!"
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "🎉 Successfully located APK at: $APK_PATH"

      - name: Upload Installer APK to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Percentify-Widget-Debug-APK
          path: ${{ steps.get_apk_path.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 14
