name: Build Android APK

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
    paths-ignore:
      - 'README.md'
      - 'metadata.json'
      - '.gitignore'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from the Actions tab on GitHub

permissions:
  contents: write

jobs:
  build:
    name: Compile and Package APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Set up Java Development Kit (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup and Cache Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.3.1'

      - name: Configure Secure Env Properties
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
            echo "Copied .env.example to .env successfully."
          else
            echo "Creating fallback empty .env file."
            touch .env
          fi

      - name: Decode Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            base64 -d debug.keystore.base64 > debug.keystore
            echo "Successfully decoded debug.keystore.base64 to debug.keystore"
          else
            echo "WARNING: debug.keystore.base64 not found!"
          fi

      - name: Build Debug Application (APK)
        run: gradle assembleDebug

      - name: Verify and Locate Generated APK
        id: get_apk_path
        run: |
          FOUND_APK=$(find app/build/outputs/apk/debug/ -name "*.apk" | head -n 1)
          if [ -z "$FOUND_APK" ]; then
            echo "❌ Error: Could not find generated APK output!"
            exit 1
          fi
          # Rename the APK to Percentify.apk
          APK_DIR=$(dirname "$FOUND_APK")
          APK_PATH="$APK_DIR/Percentify.apk"
          mv "$FOUND_APK" "$APK_PATH"
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "🎉 Successfully renamed and located APK at: $APK_PATH"

      - name: Upload Installer APK to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Percentify-Widget-Debug-APK
          path: ${{ steps.get_apk_path.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 14

      - name: Create or Update GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.get_apk_path.outputs.apk_path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

